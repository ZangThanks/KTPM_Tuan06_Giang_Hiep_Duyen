server:
  port: 8080

spring:
  application:
    name:
      api-gateway

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users,/api/users/**

        - id: food-service
          uri: lb://food-service
          predicates:
            - Path=/api/foods,/api/foods/**

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders,/api/orders/**

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments,/api/payments/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka