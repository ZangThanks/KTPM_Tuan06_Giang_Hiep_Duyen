spring.application.name=food-service

server.port=8082
server.servlet.context-path=/

# CORS - Lấy từ environment variables
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8081,http://127.0.0.1:8081,http://192.168.1.100:8081}

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true

eureka.instance.prefer-ip-address=true
eureka.instance.hostname=172.20.36.199
eureka.client.service-url.defaultZone=http://172.20.36.199:8761/eureka
